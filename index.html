<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shap-house-demo</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --ink: #163b73;
      --muted: #667085;
      --line: #d9e0ea;
      --up: #e64b5d;
      --down: #2f7df6;
      --accent: #0f2f5f;
      --shadow: 0 18px 40px rgba(18, 38, 63, .12);
      --r: 18px;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #fbfcfe 0%, #f3f6fb 100%);
      color: #1f2937
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 28px 40px
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
      line-height: 1.1;
      color: var(--ink);
      font-weight: 800
    }

    .sub {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 22px
    }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow)
    }

    .panel {
      padding: 22px
    }

    .house {
      font-size: 84px;
      line-height: 1;
      text-align: center;
      margin: 10px 0 18px
    }

    .feat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 12px;
      margin: 8px 0;
      background: #f7f9fc;
      border: 1px solid #eef2f7;
      transition: .25s
    }

    .feat.active {
      background: #eef4ff;
      border-color: #bfd3ff;
      transform: translateX(4px)
    }

    .feat .k {
      font-weight: 700;
      color: #344054
    }

    .feat .v {
      color: #475467
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 16px
    }

    label {
      font-size: 14px;
      color: #344054;
      font-weight: 700
    }

    input,
    select {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cdd6e1;
      background: #fff;
      font: inherit
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer
    }

    .primary {
      background: var(--accent);
      color: #fff
    }

    .ghost {
      background: #eef2f7;
      color: #344054
    }

    .main {
      padding: 24px
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 18px
    }

    .pricebox {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap
    }

    .price {
      font-size: 44px;
      font-weight: 800;
      color: #0f2f5f
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: #edf2ff;
      color: #31467f;
      font-weight: 700
    }

    .story {
      font-size: 18px;
      color: #475467;
      max-width: 760px
    }

    .waterfall {
      padding: 18px 10px 8px 10px
    }

    .axis {
      position: relative;
      height: 22px;
      margin: 0 18px 12px
    }

    .axisline {
      position: absolute;
      left: 0;
      right: 0;
      top: 10px;
      height: 2px;
      background: #d9e0ea
    }

    .ticks {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #667085
    }

    .row {
      display: grid;
      grid-template-columns: 180px 1fr 90px;
      gap: 14px;
      align-items: center;
      padding: 10px 8px;
      border-bottom: 1px solid #eef2f7
    }

    .fname {
      font-weight: 700;
      color: #344054
    }

    .barwrap {
      position: relative;
      height: 22px;
      background: #f4f6fa;
      border-radius: 999px;
      overflow: hidden
    }

    .zero {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #98a2b3;
      left: 50%
    }

    .bar {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 999px
    }

    .up {
      background: linear-gradient(90deg, #f28b97, var(--up))
    }

    .down {
      background: linear-gradient(90deg, #76a9ff, var(--down))
    }

    .val {
      font-weight: 800;
      text-align: right
    }

    .legend {
      display: flex;
      gap: 18px;
      align-items: center;
      color: #667085;
      font-size: 14px;
      margin: 8px 0 2px 188px
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 7px
    }

    .take {
      margin-top: 16px;
      padding: 15px 16px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e8eef6;
      color: #344054;
      font-size: 16px
    }

    .footer {
      margin-top: 12px;
      font-size: 13px;
      color: #667085
    }

    a {
      color: #1d4ed8
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Why is this small house expensive?</h1>
    <div class="sub">Interactive SHAP-style waterfall for one house-price prediction.</div>
    <div class="grid">
      <div class="card panel">
        <div class="house">🏠</div>
        <div id="featureList"></div>
        <div class="controls">
          <div>
            <label>Area (m²)
              <input id="area" type="range" min="90" max="260" step="5" value="150" />
            </label>
            <div id="areaOut" class="footer"></div>
          </div>
          <div>
            <label>Location
              <select id="location">
                <option value="premium" selected>Premium area</option>
                <option value="good">Good area</option>
                <option value="average">Average area</option>
              </select>
            </label>
          </div>
          <div>
            <label>Condition
              <select id="condition">
                <option value="renovated" selected>Renovated</option>
                <option value="good">Good</option>
                <option value="dated">Dated</option>
              </select>
            </label>
          </div>
          <div>
            <label>Garage
              <select id="garage">
                <option value="0" selected>No garage</option>
                <option value="1">Garage</option>
              </select>
            </label>
          </div>
          <div>
            <label>Amenities
              <select id="amenities">
                <option value="high" selected>Garden + transit + schools</option>
                <option value="mid">Some amenities</option>
                <option value="low">Few amenities</option>
              </select>
            </label>
          </div>
          <div class="btns">
            <button class="primary" id="paradoxBtn">Paradox mode</button>
            <button class="ghost" id="resetBtn">Reset</button>
          </div>
        </div>
      </div>
      <div class="card main">
        <div class="topline">
          <div>
            <div class="badge">Black-box Prediction Explanation</div>
            <div class="story" id="story"></div>
          </div>
          <div class="pricebox">
            <div>
              <div style="font-size:13px;color:#667085">Predicted price</div>
              <div class="price" id="predPrice"></div>
            </div>
          </div>
        </div>
        <div class="waterfall" id="waterfall"></div>
        <div class="legend">
          <span><span class="dot" style="background:var(--up)"></span>Pushes price up</span>
          <span><span class="dot" style="background:var(--down)"></span>Pushes price down</span>
        </div>
        <div class="take" id="takeaway"></div>
      </div>
    </div>
  </div>
  <script>
    const euro = n => '€' + Math.round(n).toLocaleString('en-US');
    const state = {
      base: 150000,
      area: 150,
      location: 'premium',
      condition: 'renovated',
      garage: '0',
      amenities: 'high'
    };
    const maps = {
      location: { premium: 120000, good: 50000, average: 0 },
      condition: { renovated: 60000, good: 20000, dated: -35000 },
      garage: { '1': 20000, '0': -15000 },
      amenities: { high: 25000, mid: 5000, low: -10000 }
    };
    function areaContribution(area) { return Math.round((area - 180) * 1500); }
    function features() {
      return [
        ['Area/Size', areaContribution(state.area), state.area + ' m²'],
        ['Location', maps.location[state.location], state.location],
        ['Condition', maps.condition[state.condition], state.condition],
        ['Garage', maps.garage[state.garage], state.garage === '1' ? 'yes' : 'no'],
        ['Amenities', maps.amenities[state.amenities], state.amenities]
      ];
    }
    function prediction() { return state.base + features().reduce((a, b) => a + b[1], 0); }
    function renderFeatures(activeAreaOnly = false) {
      const el = document.getElementById('featureList');
      el.innerHTML = features().map(([k, v, txt]) => `<div class="feat ${activeAreaOnly && k === 'Area/Size' ? 'active' : ''}"><div class="k">${k}</div><div class="v">${txt}</div></div>`).join('');
    }
    function renderWaterfall() {
      const rows = features().sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));
      const max = Math.max(...rows.map(r => Math.abs(r[1])), 140000);
      const wf = document.getElementById('waterfall');
      const ticks = [-max, -max / 2, 0, max / 2, max].map(v => euro(v));
      wf.innerHTML = `
    <div class="axis"><div class="axisline"></div><div class="ticks">${ticks.map(t => `<span>${t.replace('€-', '-€')}</span>`).join('')}</div></div>
    ${rows.map(([name, val, raw]) => {
        const pct = Math.abs(val) / max * 50;
        const left = val >= 0 ? 50 : 50 - pct;
        return `<div class="row">
        <div class="fname">${name}<div style="font-weight:500;color:#667085;font-size:12px">${raw}</div></div>
        <div class="barwrap"><div class="zero"></div><div class="bar ${val >= 0 ? 'up' : 'down'}" style="left:${left}%;width:${pct}%"></div></div>
        <div class="val" style="color:${val >= 0 ? 'var(--up)' : 'var(--down)'}">${val >= 0 ? '+' : '-'}${euro(Math.abs(val)).replace('€', '€')}</div>
      </div>`;
      }).join('')}
  `;
    }
    function summary() {
      const pred = prediction();
      const pos = features().filter(f => f[1] > 0).sort((a, b) => b[1] - a[1]);
      const neg = features().filter(f => f[1] < 0).sort((a, b) => a[1] - b[1]);
      const topPos = pos[0] ? pos[0][0].toLowerCase() : 'other factors';
      const topNeg = neg[0] ? neg[0][0].toLowerCase() : 'none';
      document.getElementById('predPrice').textContent = euro(pred);
      document.getElementById('story').textContent = `The model predicts ${euro(pred)} for this house. The explanation shows that ${topPos} pushes the price up the most, while ${topNeg} pushes it down.`;
      document.getElementById('takeaway').innerHTML = `<strong>Takeaway:</strong> Accuracy only tells us the model got the right answer. XAI acts as our Quality Control to verify that it got the right answer for the right reasons (aligning with real estate economics).`;
      document.getElementById('areaOut').textContent = `Current area: ${state.area} m²`;
    }
    function sync() {
      state.area = +document.getElementById('area').value;
      state.location = document.getElementById('location').value;
      state.condition = document.getElementById('condition').value;
      state.garage = document.getElementById('garage').value;
      state.amenities = document.getElementById('amenities').value;
      renderFeatures(false); renderWaterfall(); summary();
    }
    ['area', 'location', 'condition', 'garage', 'amenities'].forEach(id => document.getElementById(id).addEventListener('input', sync));
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('area').value = 150;
      document.getElementById('location').value = 'premium';
      document.getElementById('condition').value = 'renovated';
      document.getElementById('garage').value = '0';
      document.getElementById('amenities').value = 'high';
      sync();
    });
    document.getElementById('paradoxBtn').addEventListener('click', () => {
      document.getElementById('area').value = 150;
      document.getElementById('location').value = 'premium';
      document.getElementById('condition').value = 'renovated';
      document.getElementById('garage').value = '0';
      document.getElementById('amenities').value = 'high';
      sync();
      renderFeatures(true);
      document.getElementById('story').textContent = `Paradox: the house is relatively small and has no garage, yet the model still predicts ${euro(prediction())}. Reveal the other features to explain why.`;
    });
    sync();
  </script>
</body>

</html>
